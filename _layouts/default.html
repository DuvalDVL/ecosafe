<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:type" content="website">
<meta property="og:url" content="{{ site.url }}{{ page.url }}">
<meta property="og:title" content="{{ page.title }}">
<meta property="og:description" content="{{ page.description }}">
<meta property="og:image" content="{{ site.url }}/assets/img/og-image-ecosafe.jpg">

<meta property="twitter:card" content="summary_large_image">
<meta property="twitter:title" content="{{ page.title }}">
<meta property="twitter:description" content="{{ page.description }}">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="icon" type="image/png" href="{{ site.baseurl }}/assets/img/favicon.png">
  <link rel="apple-touch-icon" href="{{ site.baseurl }}/assets/img/favicon.png">
  <meta name="description" content="{{ page.description | default: site.description }}">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
  {% if page.json_ld %}
  <script type="application/ld+json">
    {{ page.json_ld }}
  </script>
  {% endif %}

  <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "LocalBusiness",
  "name": "Eco Safe",
  "description": "Expert en filtration des eaux pluviales. Solution haute performance pour le blocage des polluants à la source. Installation universelle sans perçage en 15 minutes [cite: 2026-03-02].",
  "url": "https://eco-safe.fr",
  "logo": "https://eco-safe.fr/assets/img/logo_ecosafe.png",
  "address": {
    "@type": "PostalAddress",
    "streetAddress": "2785 route de Cruseilles",
    "addressLocality": "Copponex",
    "postalCode": "74350",
    "addressCountry": "FR"
  },
  "contactPoint": {
    "@type": "ContactPoint",
    "telephone": "+33695007471",
    "contactType": "customer service",
    "email": "contact@eco-safe.fr"
  },
  "sameAs": [
    "https://linkedin.com/company/ecosafesas/",
    "https://www.instagram.com/eco_safe.fr"
  ]
}
</script>
  
</head>
<body>

  {% include header.html %}

  <main>
    {{ content }}
  </main>

  {% include footer.html %}

  <script>
document.addEventListener('DOMContentLoaded', () => {
  const toggle = document.getElementById('mobile-toggle');
  const menu = document.getElementById('mobile-menu');
  const overlay = document.getElementById('mobile-overlay');
  const dropdowns = document.querySelectorAll('.mobile-dropdown > a');
  
  // Ouvrir/fermer le menu
  toggle.addEventListener('click', () => {
    toggle.classList.toggle('active');
    menu.classList.toggle('active');
    overlay.classList.toggle('active');
  });
  
  // Fermer en cliquant sur l'overlay
  overlay.addEventListener('click', () => {
    toggle.classList.remove('active');
    menu.classList.remove('active');
    overlay.classList.remove('active');
  });
  
  // Dropdowns dans le menu mobile
  dropdowns.forEach(dropdown => {
    dropdown.addEventListener('click', (e) => {
      e.preventDefault();
      dropdown.parentElement.classList.toggle('active');
    });
  });
});
</script>

<script src="{{ site.baseurl }}/assets/js/scripts.js"></script>
  
</body>
</html>
